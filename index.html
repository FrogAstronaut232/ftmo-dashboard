<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManifoldFX</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <div class="brand">ManifoldFX</div>
    <div class="brand-sub" id="meta-line">&mdash;</div>
  </div>
  <div class="masthead-right">
    <span class="phase" id="phase-badge">&mdash;</span>
    <span class="dryrun" id="dryrun-tag" hidden>DRY RUN</span>
    <div class="updated" id="updated-at">&mdash;</div>
  </div>
</header>

<section class="summary">
  <div class="stat"><span class="stat-label">Equity</span><span class="stat-value" id="m-equity">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Today</span><span class="stat-value" id="m-today">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Total P&amp;L</span><span class="stat-value" id="m-total">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Drawdown</span><span class="stat-value" id="m-dd">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Win rate</span><span class="stat-value" id="m-wr">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Trades</span><span class="stat-value" id="m-trades">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Profit factor</span><span class="stat-value" id="m-pf">&mdash;</span></div>
  <div class="stat"><span class="stat-label">Sharpe</span><span class="stat-value" id="m-sharpe">&mdash;</span></div>
</section>

<section class="block">
  <h2>Open positions</h2>
  <table class="data-table" id="positions-table">
    <thead>
      <tr>
        <th>Asset</th>
        <th>Side</th>
        <th class="num">Lots</th>
        <th>Since</th>
        <th class="num">Entry</th>
        <th class="num">Current</th>
        <th class="num">Floating P&amp;L</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="7" class="empty">No open positions.</td></tr></tbody>
  </table>
</section>

<section class="block">
  <h2>Equity curve</h2>
  <div id="equity-chart" class="chart"></div>
</section>

<div class="two-col">
  <section class="block">
    <h2>Trades</h2>
    <table class="data-table" id="trades-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Asset</th>
          <th>Side</th>
          <th class="num">Lots</th>
          <th class="num">P&amp;L</th>
          <th class="num">Days</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="6" class="empty">&mdash;</td></tr></tbody>
    </table>
  </section>

  <section class="block">
    <h2>Signals</h2>
    <table class="data-table" id="signals-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Asset</th>
          <th class="num">Conviction</th>
          <th>Decision</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="4" class="empty">&mdash;</td></tr></tbody>
    </table>
  </section>
</div>

<footer class="page-foot">
  <span id="foot-meta">&mdash;</span>
</footer>

<script src="app.js"></script>
</body>
</html>
